 QUY TRÌNH KÍCH HOẠT QR CODE CHO THÍ SINH

🔧 CÁC FILE CẦN CHẠY:

server.js - Server chính (chạy trên cổng 3000)
index.html - Giao diện chính cho MC
mobile.html - Giao diện cho thí sinh (trên điện thoại)
📝 CÁC BƯỚC KÍCH HOẠT:

Bước 1: Cài đặt dependencies

bash
cd dienthoai
npm install
Bước 2: Chạy server

bash
npm start
# Hoặc: node server.js
Bước 3: Mở giao diện MC

Trình duyệt: http://localhost:3000
Đây là giao diện chính để điều khiển gameshow
Bước 4: Kích hoạt QR Code

Trong giao diện MC, nhấn nút "📱 HIỂN THỊ QR CODE CHO THÍ SINH"
Hệ thống sẽ hiển thị 4 mã QR cho 4 thí sinh
Bước 5: Thí sinh kết nối

Mỗi thí sinh dùng điện thoại quét mã QR tương ứng
Điện thoại sẽ mở trang mobile.html
Thí sinh nhập tên và xác nhận kết nối
🌐 CẤU HÌNH MẠNG:

QUAN TRỌNG: Máy tính và điện thoại phải cùng một mạng WiFi!

IP hiện tại trong code: 192.168.91.80 (cần cập nhật IP của bạn)

📱 URL cho thí sinh:

http://192.168.91.80:3000/mobile?player=F1
http://192.168.91.80:3000/mobile?player=F2  
http://192.168.91.80:3000/mobile?player=F3
http://192.168.91.80:3000/mobile?player=F4
🔧 CẦN CẤU HÌNH LẠI:

Trong file index.html (dòng 3347), cập nhật IP của bạn:

javascript
const serverIp = "192.168.91.80"; // ← Đổi thành IP của bạn
✅ KIỂM TRA HOẠT ĐỘNG:

Server chạy trên cổng 3000
Console (F12) hiển thị kết nối
4 thí sinh kết nối thành công
Bắt đầu gameshow bình thường
🚨 LƯU Ý:

Cần cài Node.js trước
Kiểm tra firewall không chặn cổng 3000
Đảm bảo WiFi ổn định